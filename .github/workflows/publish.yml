name: Publish to Docker Hub

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v0.3.0, v1.0.0

jobs:
  publish:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract version from tag
      id: version
      run: |
        # Extract version without 'v' prefix (v0.3.0 -> 0.3.0)
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          westbrookai/zipsa-runtime:latest
          westbrookai/zipsa-runtime:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        labels: |
          org.opencontainers.image.title=Zipsa Runtime
          org.opencontainers.image.description=Lightweight Docker runtime for executing SKILLs with Claude Code, Codex, and Gemini CLI
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.source=https://github.com/westbrookai/zipsa-runtime
          org.opencontainers.image.licenses=MIT

    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: westbrookai/zipsa-runtime
        readme-filepath: ./README.md
