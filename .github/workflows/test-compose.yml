name: Docker Compose Integration Tests

on:
  push:
    branches: [main, dev/**]
    paths:
      - 'examples/minimal-agent/**'
      - 'docker-compose.yml'
      - '.github/workflows/test-compose.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/minimal-agent/**'
      - 'docker-compose.yml'
      - '.github/workflows/test-compose.yml'

jobs:
  test-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: |
          cd examples/minimal-agent
          docker compose config

      - name: Test setup script
        run: |
          cd examples/minimal-agent
          # Create mock .env for testing
          echo "ANTHROPIC_API_KEY=test-key-for-ci" > .env

          # Verify setup script is executable
          test -x setup.sh || chmod +x setup.sh

      - name: Build and start services
        run: |
          cd examples/minimal-agent
          docker compose up -d

      - name: Wait for container
        run: |
          timeout 30 bash -c 'until docker compose -f examples/minimal-agent/docker-compose.yml ps | grep -q "Up"; do sleep 2; done'

      - name: Verify Claude Code installation
        run: |
          cd examples/minimal-agent
          docker compose exec -T minimal-agent claude --version

      - name: Test workspace mount
        run: |
          cd examples/minimal-agent
          docker compose exec -T minimal-agent test -d /workspace

      - name: Cleanup
        if: always()
        run: |
          cd examples/minimal-agent
          docker compose down -v
